<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MapLibre Vector Map Localization</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet"/>
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>

    <link rel="stylesheet" href="style.css" inline>
  </head>

  <body>
    <div class="app-shell">
      <select id="mapStyleSelect" class="map-style-select" aria-label="Geoapify map style"></select>

      <aside class="control-panel">
        <h1>Map Localization</h1>
        <p class="panel-description">
          Select a label language, then apply.
        </p>

        <label for="languageSelect">Language</label>
        <select id="languageSelect"></select>

        <button id="applySettingsButton" type="button">Apply</button>

        <div class="status-box" id="statusBox">
          Ready.
        </div>
      </aside>

      <main class="map-stage">
        <div id="map"></div>
      </main>
    </div>

    <script src="script.js" inline></script>
  </body>

</html>
