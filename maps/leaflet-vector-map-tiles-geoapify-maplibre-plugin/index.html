<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Leaflet Vector Map Tiles (Geoapify + MapLibre plugin)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <link
            href="https://unpkg.com/maplibre-gl@2.2.1/dist/maplibre-gl.css"
            rel="stylesheet"/>
    <style>html, body, #my-map { height: 100%; margin: 0; }</style>

  </head>

  <body>
    <!-- The container where the map will be rendered -->
    <div id="my-map"></div>

    <!-- Load Leaflet JavaScript library (the leaflet.css in the <head> tag) -->
    <!-- Check the actual version on https://leafletjs.com/download.html -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- MapLibre GL + maplibre-gl-leaflet bridge -->
    <!-- Load MapLibre GL library -->
    <script src="https://unpkg.com/maplibre-gl@2.2.1/dist/maplibre-gl.js"></script>

    <!-- Load MapLibre GL Leaflet bridge -->
    <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.0.20/leaflet-maplibre-gl.js"></script>
    <script>// 👉 Replace with your own API key. Sign up at https://www.geoapify.com/ to get one.
const apiKey = "f82ea38cb77543d59c597faaa263e714";

// Initialize the map and set its view to Chicago (lat/lon) with zoom level 16
const map = L.map("my-map").setView([41.890491, -87.654306], 16);

// Use maplibre-gl-leaflet to add Geoapify style.json
const glLayer = L.maplibreGL({
style: `https://maps.geoapify.com/v1/styles/toner-grey/style.json?apiKey=${apiKey}`
}).addTo(map);

// Attribution
// Note: style.json (Mapbox Style Spec) does not automatically provide attribution in Leaflet.
// To comply with licensing, add the required attribution manually (Geoapify, OpenMapTiles, OpenStreetMap).
map.attributionControl.addAttribution('Powered by <a href="https://www.geoapify.com/" target="_blank">Geoapify</a> | <a href="https://openmaptiles.org/" target="_blank">© OpenMapTiles</a> <a href="https://www.openstreetmap.org/copyright" target="_blank">© OpenStreetMap</a> contributors');</script>

  </body>

</html>
