<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>MapLibre GL Integration — Vector maps and reverse geocoding on click</title>
    <style>html,
body {
  margin: 0;
  height: 100%;
  width: 100%;
}

/* Style for the Map */
#map {
  height: 100%; /* Set the map container height */
  width: 100%; /* Set the map container width */
}

.autocomplete-panel {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 400px;
  z-index: 1002;

  pointer-events: none;
}

.autocomplete-container {
  position: relative;
  height: calc(100vh - 20px);
}

/* Theme selector styling */
.theme-selector {
  position: absolute;
  top: 70px;
  left: 10px;
  z-index: 1001;
  display: flex;
  align-items: center;
  background: white;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 2px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.theme-label {
  font-size: 12px;
  color: #666;
  font-weight: 500;
  padding: 4px 8px 4px 12px;
  border-right: 1px solid #eee;
  background: #f8f9fa;
  border-radius: 4px 0 0 4px;
  white-space: nowrap;
}

.theme-selector select {
  padding: 4px 8px;
  border: none;
  background: transparent;
  color: #333;
  font-size: 12px;
  cursor: pointer;
  min-width: 100px;
  border-radius: 0 4px 4px 0;
}

.theme-selector select:focus {
  outline: none;
}

.theme-selector:hover {
  border-color: #007bff;
  box-shadow: 0 2px 12px rgba(0, 123, 255, 0.15);
}

/* Dark theme styles for the demo page */
body.theme-minimal-dark,
body.theme-round-borders-dark {
  background-color: #1a1a1a;
  color: #e0e0e0;
}

body.theme-minimal-dark .theme-selector,
body.theme-round-borders-dark .theme-selector {
  background: #333;
  border-color: #555;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
}

body.theme-minimal-dark .theme-label,
body.theme-round-borders-dark .theme-label {
  color: #bbb;
  background: #444;
  border-right-color: #555;
}

body.theme-minimal-dark .theme-selector select,
body.theme-round-borders-dark .theme-selector select {
  color: #e0e0e0;
}

body.theme-minimal-dark .theme-selector:hover,
body.theme-round-borders-dark .theme-selector:hover {
  border-color: #007bff;
  box-shadow: 0 2px 12px rgba(0, 123, 255, 0.2);
}</style>

  </head>
    
  <body>
  <html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapLibre with Address Autocomplete and Reverse Geocoding - Geoapify</title>

  <!-- MapLibre GL CSS -->
  <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />

  <!-- Geoapify Geocoder Autocomplete CSS -->
  <link id="geocoder-theme" rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@geoapify/geocoder-autocomplete@3.0.1/styles/minimal.css" />

  <link rel="stylesheet" href="./index.css">
</head>

<body>
  <div class="theme-selector">
    <span class="theme-label">Theme:</span>
    <select id="theme-selector" onchange="setTheme(this.value)">
      <option value="minimal">Light</option>
      <option value="minimal-dark">Dark</option>
      <option value="round-borders">Light (Round)</option>
      <option value="round-borders-dark">Dark (Round)</option>
    </select>
  </div>

  <!-- Map container -->
  <div id="map"></div>

  <!-- Autocomplete container -->
  <div class="autocomplete-panel">
    <div id="autocomplete" class="autocomplete-container"></div>
  </div>

  <!-- MapLibre GL JS -->
  <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>

  <!-- Geoapify Geocoder Autocomplete JS -->
  <script src="https://cdn.jsdelivr.net/npm/@geoapify/geocoder-autocomplete@3.0.1/dist/index.min.js"></script>

  <script src="./index.js"></script>
</body>

</html>
    <script>/* WARNING: This API key is provided for DEMO purposes only.
   Please sign up at https://www.geoapify.com and generate your own API key.
   The demo key may be rotated or blocked at any moment without notice.
*/
const myAPIKey = "e95f313d38334f9f955e65b71a289126";

// Map style configurations for different themes
const mapStyles = {
  light: `https://maps.geoapify.com/v1/styles/osm-bright-grey/style.json?apiKey=${myAPIKey}`,
  dark: `https://maps.geoapify.com/v1/styles/dark-matter-brown/style.json?apiKey=${myAPIKey}`
};

// The MapLibre GL map object
const map = new maplibregl.Map({
  container: "map", // ID of the container element
  style: mapStyles.light, // Start with light theme
  center: [-77.02346458179596, 38.908838755401035], // Initial center [longitude, latitude]
  zoom: 12, // Initial zoom level
  maxZoom: 20 // Max zoom level
});

// Function to switch map theme
function switchMapTheme(themeName) {
  console.log("Switching map theme to:", themeName);

  // Determine if it's a dark theme
  const isDarkTheme = themeName.includes("dark");
  const newStyle = isDarkTheme ? mapStyles.dark : mapStyles.light;

  console.log("Using style:", isDarkTheme ? "dark" : "light");

  // Switch map style
  map.setStyle(newStyle);

  // Re-add controls and event listeners after style change
  map.once("style.load", () => {
    // Re-add click event listener
    map.on("click", function (e) {
      const lat = e.lngLat.lat;
      const lon = e.lngLat.lng;

      getAddressByLatLon(lat, lon).then((location) => {
        if (marker) {
          marker.remove();
        }

        autocompleteInput.setValue(location.properties.formatted);
        marker = new maplibregl.Marker({
          element: createMarkerIcon(),
          offset: [0, -25]
        })
          .setLngLat([location.properties.lon, location.properties.lat])
          .addTo(map);
      });
    });
  });
}

// Re-add navigation control
map.addControl(new maplibregl.NavigationControl({ position: "bottom-right" }));

// check the available autocomplete options on the https://www.npmjs.com/package/@geoapify/geocoder-autocomplete
const autocompleteInput = new autocomplete.GeocoderAutocomplete(
  document.getElementById("autocomplete"),
  myAPIKey,
  {
    /* Geocoder options */
  }
);

// Generate a marker icon with https://apidocs.geoapify.com/playground/icon
const markerIcon = new maplibregl.Marker({
  element: createMarkerIcon(),
  anchor: "bottom"
});

function createMarkerIcon() {
  const img = document.createElement("img");
  img.src = `https://api.geoapify.com/v2/icon/?type=awesome&color=%23ff5b5f&size=50&scaleFactor=2&apiKey=${myAPIKey}`;
  img.style.width = "38px";
  img.style.height = "55px";
  return img;
}

let marker;

autocompleteInput.on("select", (location) => {
  // Add marker with the selected location
  if (marker) {
    marker.remove();
  }

  if (location) {
    marker = new maplibregl.Marker({
      element: createMarkerIcon(),
      offset: [0, -25 /* -(icon height - icon shadow offset) / 2 */]
    })
      .setLngLat([location.properties.lon, location.properties.lat])
      .addTo(map);

    map.flyTo({
      center: [location.properties.lon, location.properties.lat],
      zoom: 14
    });
  }
});

// Add click event listener to the map
map.on("click", function (e) {
  const lat = e.lngLat.lat; // Get latitude from the click event
  const lon = e.lngLat.lng; // Get longitude from the click event

  // Call reverse geocoding for the clicked location
  getAddressByLatLon(lat, lon).then((location) => {
    if (marker) {
      marker.remove();
    }

    autocompleteInput.setValue(location.properties.formatted);
    marker = new maplibregl.Marker({
      element: createMarkerIcon(),
      offset: [0, -25 /* -(icon height - icon shadow offset) / 2 */]
    })
      .setLngLat([location.properties.lon, location.properties.lat])
      .addTo(map);
  });
});

function getAddressByLatLon(lat, lon) {
  return fetch(
    `https://api.geoapify.com/v1/geocode/reverse?lat=${lat}&lon=${lon}&apiKey=${myAPIKey}`
  )
    .then((result) => result.json())
    .then((result) => {
      if (result && result.features && result.features.length) {
        return result.features[0];
      }

      return null;
    });
}

// Wait for DOM to be ready, then override the setTheme function
document.addEventListener("DOMContentLoaded", function () {
  // Override the setTheme function to also switch map theme
  const originalSetTheme = window.setTheme;
  if (originalSetTheme) {
    window.setTheme = function (themeName) {
      console.log("Theme changed to:", themeName);
      // Call the original setTheme function
      originalSetTheme(themeName);

      // Switch map theme
      switchMapTheme(themeName);
    };
  }
});

function setTheme(themeName) {
  const themeLink = document.getElementById("geocoder-theme");
  themeLink.href = `https://cdn.jsdelivr.net/npm/@geoapify/geocoder-autocomplete@3.0.1/styles/${themeName}.css`;

  // Update body class for additional styling if needed
  document.body.className = document.body.className.replace(/theme-\w+/g, "");
  document.body.classList.add(`theme-${themeName}`);

  // Debug: log the current theme and body classes
  console.log("Theme changed to:", themeName);
  console.log("Body classes:", document.body.className);
  console.log("Theme class added:", `theme-${themeName}`);

  // Wait for CSS to load, then apply styles
  themeLink.onload = function () {
    if (themeName === "round-borders-dark") {
      setTimeout(applyRoundDarkStyles, 100); // Small delay to ensure CSS is applied
    }
  };

  // Store theme preference in localStorage
  localStorage.setItem("geocoder-theme", themeName);
}

function applyRoundDarkStyles() {
  // Find all autocomplete inputs and apply styles directly
  const inputs = document.querySelectorAll(".geoapify-autocomplete-input");
  inputs.forEach((input) => {
    input.style.backgroundColor = "rgba(255, 255, 255, 0.2)";
    input.style.borderColor = "rgba(255, 255, 255, 0.4)";
    console.log("Applied styles to input:", input);
  });

  console.log("Applied round-dark styles to", inputs.length, "inputs");
}

// Load saved theme on page load
function loadSavedTheme() {
  const savedTheme = localStorage.getItem("geocoder-theme") || "minimal";
  document.getElementById("theme-selector").value = savedTheme;
  setTheme(savedTheme);
}

// Initialize theme when page loads
window.addEventListener("load", loadSavedTheme);</script>

  </body>
  
</html>
