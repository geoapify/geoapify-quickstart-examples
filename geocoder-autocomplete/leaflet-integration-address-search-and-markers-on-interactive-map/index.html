<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Leaflet Integration — Address search and markers on interactive map</title>
    <style>.autocomplete-panel {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 400px;
  z-index: 1002;
}

.autocomplete-container {
  position: relative;
}

/* Theme selector styling */
.theme-selector {
  position: absolute;
  top: 70px;
  left: 10px;
  z-index: 1001;
  display: flex;
  align-items: center;
  background: white;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 2px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.theme-label {
  font-size: 12px;
  color: #666;
  font-weight: 500;
  padding: 4px 8px 4px 12px;
  border-right: 1px solid #eee;
  background: #f8f9fa;
  border-radius: 4px 0 0 4px;
  white-space: nowrap;
}

.theme-selector select {
  padding: 4px 8px;
  border: none;
  background: transparent;
  color: #333;
  font-size: 12px;
  cursor: pointer;
  min-width: 100px;
  border-radius: 0 4px 4px 0;
}

.theme-selector select:focus {
  outline: none;
}

.theme-selector:hover {
  border-color: #007bff;
  box-shadow: 0 2px 12px rgba(0, 123, 255, 0.15);
}

/* Dark theme styles for the demo page */
body.theme-minimal-dark,
body.theme-round-borders-dark {
  background-color: #1a1a1a;
  color: #e0e0e0;
}

body.theme-minimal-dark .theme-selector,
body.theme-round-borders-dark .theme-selector {
  background: #333;
  border-color: #555;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
}

body.theme-minimal-dark .theme-label,
body.theme-round-borders-dark .theme-label {
  color: #bbb;
  background: #444;
  border-right-color: #555;
}

body.theme-minimal-dark .theme-selector select,
body.theme-round-borders-dark .theme-selector select {
  color: #e0e0e0;
}

body.theme-minimal-dark .theme-selector:hover,
body.theme-round-borders-dark .theme-selector:hover {
  border-color: #007bff;
  box-shadow: 0 2px 12px rgba(0, 123, 255, 0.2);
}

html,
body,
#map {
  width: 100%;
  height: 100%;
  margin: 0;
}</style>

  </head>
    
  <body>
  <!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaflet Map with Address Autocomplete - Geoapify</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Geoapify Geocoder Autocomplete CSS -->
  <link id="geocoder-theme" rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@geoapify/geocoder-autocomplete@3.0.1/styles/minimal.css" />

  <link rel="stylesheet" href="./index.css">
</head>

<body>
  <div class="theme-selector">
    <span class="theme-label">Theme:</span>
    <select id="theme-selector" onchange="setTheme(this.value)">
      <option value="minimal">Light</option>
      <option value="minimal-dark">Dark</option>
      <option value="round-borders">Light (Round)</option>
      <option value="round-borders-dark">Dark (Round)</option>
    </select>
  </div>

  <div id="map"></div>
  <div class="autocomplete-panel">
    <div id="autocomplete" class="autocomplete-container"></div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Geoapify Geocoder Autocomplete JS -->
  <script src="https://cdn.jsdelivr.net/npm/@geoapify/geocoder-autocomplete@3.0.1/dist/index.min.js"></script>

  <script src="./index.js"></script>
</body>

</html>
    <script>/* WARNING: This API key is provided for DEMO purposes only.
   Please sign up at https://www.geoapify.com and generate your own API key.
   The demo key may be rotated or blocked at any moment without notice.
*/
const myAPIKey = "e95f313d38334f9f955e65b71a289126";

// The Leaflet map Object
const map = L.map("map", { zoomControl: false }).setView(
  [38.908838755401035, -77.02346458179596],
  12
);

// Retina displays require different mat tiles quality
const isRetina = L.Browser.retina;

// Map tile configurations for different themes
const mapTiles = {
  light: {
    baseUrl:
      "https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}.png?apiKey={apiKey}",
    retinaUrl:
      "https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}@2x.png?apiKey={apiKey}",
    attribution:
      'Powered by <a href="https://www.geoapify.com/" target="_blank">Geoapify</a> | <a href="https://openmaptiles.org/" rel="nofollow" target="_blank">© OpenMapTiles</a> <a href="https://www.openstreetmap.org/copyright" rel="nofollow" target="_blank">© OpenStreetMap</a> contributors'
  },
  dark: {
    baseUrl:
      "https://maps.geoapify.com/v1/tile/dark-matter-brown/{z}/{x}/{y}.png?apiKey={apiKey}",
    retinaUrl:
      "https://maps.geoapify.com/v1/tile/dark-matter-brown/{z}/{x}/{y}@2x.png?apiKey={apiKey}",
    attribution:
      'Powered by <a href="https://www.geoapify.com/" target="_blank">Geoapify</a> | <a href="https://openmaptiles.org/" rel="nofollow" target="_blank">© OpenMapTiles</a> <a href="https://www.openstreetmap.org/copyright" rel="nofollow" target="_blank">© OpenStreetMap</a> contributors'
  }
};

let currentTileLayer;

// Function to switch map theme
function switchMapTheme(themeName) {
  console.log("Switching map theme to:", themeName);

  // Remove current tile layer
  if (currentTileLayer) {
    map.removeLayer(currentTileLayer);
  }

  // Determine if it's a dark theme
  const isDarkTheme = themeName.includes("dark");
  const tileConfig = isDarkTheme ? mapTiles.dark : mapTiles.light;

  console.log("Using tiles:", isDarkTheme ? "dark" : "light");

  // Add new tile layer
  currentTileLayer = L.tileLayer(
    isRetina ? tileConfig.retinaUrl : tileConfig.baseUrl,
    {
      attribution: tileConfig.attribution,
      apiKey: myAPIKey,
      maxZoom: 20,
      id: isDarkTheme ? "dark-matter-brown" : "osm-bright"
    }
  ).addTo(map);
}

// Initialize with light theme
switchMapTheme("minimal");

// add a zoom control to bottom-right corner
L.control
  .zoom({
    position: "bottomright"
  })
  .addTo(map);

// check the available autocomplete options on the https://www.npmjs.com/package/@geoapify/geocoder-autocomplete
const autocompleteInput = new autocomplete.GeocoderAutocomplete(
  document.getElementById("autocomplete"),
  myAPIKey,
  {
    /* Geocoder options */
  }
);

// generate an marker icon with https://apidocs.geoapify.com/playground/icon
const markerIcon = L.icon({
  iconUrl: `https://api.geoapify.com/v1/icon/?type=awesome&color=%232ea2ff&size=large&scaleFactor=2&apiKey=${myAPIKey}`,
  iconSize: [38, 56], // size of the icon
  iconAnchor: [19, 51], // point of the icon which will correspond to marker's location
  popupAnchor: [0, -60] // point from which the popup should open relative to the iconAnchor
});

let marker;

autocompleteInput.on("select", (location) => {
  // Add marker with the selected location
  if (marker) {
    marker.remove();
  }

  if (location) {
    marker = L.marker([location.properties.lat, location.properties.lon], {
      icon: markerIcon
    }).addTo(map);

    map.panTo([location.properties.lat, location.properties.lon]);
  }
});

// Wait for DOM to be ready, then override the setTheme function
document.addEventListener("DOMContentLoaded", function () {
  // Override the setTheme function to also switch map theme
  const originalSetTheme = window.setTheme;
  if (originalSetTheme) {
    window.setTheme = function (themeName) {
      console.log("Theme changed to:", themeName);
      // Call the original setTheme function
      originalSetTheme(themeName);

      // Switch map theme
      switchMapTheme(themeName);
    };
  }
});

function setTheme(themeName) {
  const themeLink = document.getElementById("geocoder-theme");
  themeLink.href = `https://cdn.jsdelivr.net/npm/@geoapify/geocoder-autocomplete@3.0.1/styles/${themeName}.css`;

  // Update body class for additional styling if needed
  document.body.className = document.body.className.replace(/theme-\w+/g, "");
  document.body.classList.add(`theme-${themeName}`);

  // Debug: log the current theme and body classes
  console.log("Theme changed to:", themeName);
  console.log("Body classes:", document.body.className);
  console.log("Theme class added:", `theme-${themeName}`);

  // Wait for CSS to load, then apply styles
  themeLink.onload = function () {
    if (themeName === "round-borders-dark") {
      setTimeout(applyRoundDarkStyles, 100); // Small delay to ensure CSS is applied
    }
  };

  // Store theme preference in localStorage
  localStorage.setItem("geocoder-theme", themeName);
}

function applyRoundDarkStyles() {
  // Find all autocomplete inputs and apply styles directly
  const inputs = document.querySelectorAll(".geoapify-autocomplete-input");
  inputs.forEach((input) => {
    input.style.backgroundColor = "rgba(255, 255, 255, 0.2)";
    input.style.borderColor = "rgba(255, 255, 255, 0.4)";
    console.log("Applied styles to input:", input);
  });

  console.log("Applied round-dark styles to", inputs.length, "inputs");
}

// Load saved theme on page load
function loadSavedTheme() {
  const savedTheme = localStorage.getItem("geocoder-theme") || "minimal";
  document.getElementById("theme-selector").value = savedTheme;
  setTheme(savedTheme);
}

// Initialize theme when page loads
window.addEventListener("load", loadSavedTheme);</script>

  </body>
  
</html>
