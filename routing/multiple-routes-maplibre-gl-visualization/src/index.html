<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Routes Visualization — MapLibre GL</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css">
    <link rel="stylesheet" href="style.css" inline>
  </head>
  <body>
    <div class="panel">
      <h3>Multiple Routes</h3>
      <p class="hint">Routes from different origins to Arc de Triomphe</p>
      <div id="routes-list"></div>

      <div id="route-details" class="route-details-panel hidden">
        <h4>Route Details</h4>
        <div id="route-details-content"></div>
      </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
    <script src="script.js" inline></script>
  </body>
</html>
