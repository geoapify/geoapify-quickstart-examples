<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Routes Visualization — MapLibre GL</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css">
    <style>/* Base */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: system-ui, sans-serif;
}

/* Layout */
#map {
    position: absolute;
    top: 0;
    left: 280px;
    right: 0;
    bottom: 0;
}

.panel {
    position: absolute;
    top: 0;
    left: 0;
    width: 280px;
    height: 100%;
    background: #fff;
    padding: 16px;
    overflow-y: auto;
    box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
    z-index: 1000;
}

.panel h3 {
    margin-bottom: 4px;
    font-size: 18px;
}

.hint {
    font-size: 12px;
    color: #888;
    margin-bottom: 16px;
}

/* Route Items */
.route-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    margin-bottom: 8px;
    background: #f5f5f5;
    border-radius: 8px;
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
}

.route-item:hover {
    background: #eee;
}

.route-item.disabled {
    opacity: 0.4;
}

.route-item.active {
    background: #e3f2fd;
    border-left-color: #2196F3;
}

.route-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
}

.route-details {
    flex: 1;
}

.route-name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 2px;
}

.route-info {
    font-size: 12px;
    color: #666;
}

.route-toggle {
    width: 18px;
    height: 18px;
    cursor: pointer;
    flex-shrink: 0;
}

/* Route Details Panel */
.route-details-panel {
    margin-top: 16px;
    padding: 14px;
    background: #f8f9fa;
    border-radius: 8px;
    border-left: 4px solid #2196F3;
}

.route-details-panel.hidden {
    display: none;
}

.route-details-panel h4 {
    font-size: 13px;
    color: #666;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.detail-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #e0e0e0;
    font-size: 13px;
}

.detail-row:last-child {
    border-bottom: none;
}

.detail-label {
    color: #888;
}

.detail-value {
    font-weight: 500;
    color: #333;
}

/* MapLibre popup */
.maplibregl-popup-content {
    padding: 10px 14px;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    border-radius: 8px;
}

/* Responsive */
@media (max-width: 600px) {
    #map {
        left: 0;
        bottom: 45%;
    }

    .panel {
        width: 100%;
        height: 45%;
        top: auto;
        bottom: 0;
    }
}

</style>
  </head>
  <body>
    <div class="panel">
      <h3>Multiple Routes</h3>
      <p class="hint">Routes from different origins to Arc de Triomphe</p>
      <div id="routes-list"></div>

      <div id="route-details" class="route-details-panel hidden">
        <h4>Route Details</h4>
        <div id="route-details-content"></div>
      </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
    <script>/* Geoapify Routing API — Multiple Routes Visualization (MapLibre GL)
   Shows overlapping routes from different origins to a common destination.
   Get your API key at https://www.geoapify.com */

// 👉 Replace with your own API key
const API_KEY = "e95f313d38334f9f955e65b71a289126";

// ─────────────────────────────────────────────────────────────
// Route Definitions
// ─────────────────────────────────────────────────────────────

const DESTINATION = {
    lat: 48.8738,
    lon: 2.2950,
    name: "Arc de Triomphe"
};

const ROUTES = [
    {id: "r1", name: "From Eiffel Tower", color: "#E53935", origin: {lat: 48.8584, lon: 2.2945}},
    {id: "r2", name: "From Louvre", color: "#43A047", origin: {lat: 48.8606, lon: 2.3376}},
    {id: "r3", name: "From Notre-Dame", color: "#1E88E5", origin: {lat: 48.8530, lon: 2.3499}},
    {id: "r4", name: "From Sacré-Cœur", color: "#FB8C00", origin: {lat: 48.8867, lon: 2.3431}}
];

// Offset in pixels for parallel routes (visual offset only)
const OFFSETS = [-6, -2, 2, 6];

// ─────────────────────────────────────────────────────────────
// State & Map Setup
// ─────────────────────────────────────────────────────────────

const routeState = {};
let markers = [];

const map = new maplibregl.Map({
    container: "map",
    style: `https://maps.geoapify.com/v1/styles/osm-bright/style.json?apiKey=${API_KEY}`,
    center: [2.32, 48.866],
    zoom: 13
});

map.addControl(new maplibregl.NavigationControl(), "bottom-right");

// ─────────────────────────────────────────────────────────────
// Fetch Routes from Routing API
// ─────────────────────────────────────────────────────────────

map.on("load", () => {
    ROUTES.forEach((route, index) => {
        const waypoints = `${route.origin.lat},${route.origin.lon}|${DESTINATION.lat},${DESTINATION.lon}`;
        const url = `https://api.geoapify.com/v1/routing?waypoints=${waypoints}&mode=drive&apiKey=${API_KEY}`;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                if (!data.features?.[0]) return;

                const feature = data.features[0];
                const props = feature.properties;

                // Store route state
                routeState[route.id] = {
                    ...route,
                    index: index,
                    visible: true,
                    feature: feature,
                    distance: (props.distance / 1000).toFixed(1),
                    duration: Math.round(props.time / 60)
                };

                addRouteLayer(route.id);
                updateUI();
                renderMarkers();
            });
    });
});

// ─────────────────────────────────────────────────────────────
// Route Layers (with visual pixel offset for parallel routes)
// ─────────────────────────────────────────────────────────────

function addRouteLayer(routeId) {
    const route = routeState[routeId];
    const offsetPixels = OFFSETS[route.index % OFFSETS.length];

    // Add source with original route geometry (no geometric offsetting)
    map.addSource(routeId, {
        type: "geojson",
        data: route.feature
    });

    // Add outline layer with pixel-based visual offset
    map.addLayer({
        id: `${routeId}-outline`,
        type: "line",
        source: routeId,
        layout: {
            "line-join": "round",
            "line-cap": "round"
        },
        paint: {
            "line-color": darkenColor(route.color, 30),
            "line-width": 7,
            "line-opacity": 0.9,
            "line-offset": offsetPixels
        }
    });

    // Add main line layer with same pixel-based visual offset
    map.addLayer({
        id: `${routeId}-line`,
        type: "line",
        source: routeId,
        layout: {
            "line-join": "round",
            "line-cap": "round"
        },
        paint: {
            "line-color": route.color,
            "line-width": 4,
            "line-opacity": 1,
            "line-offset": offsetPixels
        }
    });
}

function removeRouteLayer(routeId) {
    if (map.getLayer(`${routeId}-line`)) map.removeLayer(`${routeId}-line`);
    if (map.getLayer(`${routeId}-outline`)) map.removeLayer(`${routeId}-outline`);
    if (map.getSource(routeId)) map.removeSource(routeId);
}

function extractCoordinates(geometry) {
    if (geometry.type === "MultiLineString") {
        return geometry.coordinates.flat();
    }
    return geometry.coordinates;
}

// ─────────────────────────────────────────────────────────────
// Color Utilities
// ─────────────────────────────────────────────────────────────

function darkenColor(hex, percent) {
    const num = parseInt(hex.replace("#", ""), 16);
    const amt = Math.round(2.55 * percent);
    const R = Math.max((num >> 16) - amt, 0);
    const G = Math.max((num >> 8 & 0x00FF) - amt, 0);
    const B = Math.max((num & 0x0000FF) - amt, 0);
    return "#" + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
}

// ─────────────────────────────────────────────────────────────
// Markers (Geoapify Marker Icon API v2)
// ─────────────────────────────────────────────────────────────

function renderMarkers() {
    // Clear existing markers
    markers.forEach(m => m.remove());
    markers = [];

    // Destination marker
    markers.push(createMarker(DESTINATION.lon, DESTINATION.lat, "%23E91E63", "flag", DESTINATION.name, "Destination"));

    // Origin markers
    Object.values(routeState).forEach(route => {
        if (!route.visible) return;
        const color = route.color.replace("#", "%23");
        const name = route.name.replace("From ", "");
        markers.push(createMarker(route.origin.lon, route.origin.lat, color, "circle", name, "Origin"));
    });
}

function createMarker(lon, lat, color, iconName, name, label) {
    const el = document.createElement("div");
    el.style.width = "36px";
    el.style.height = "48px";
    el.style.backgroundImage = `url(https://api.geoapify.com/v2/icon?type=awesome&color=${color}&icon=${iconName}&iconType=awesome&size=48&scaleFactor=2&apiKey=${API_KEY})`;
    el.style.backgroundSize = "contain";
    el.style.backgroundRepeat = "no-repeat";
    el.style.cursor = "pointer";

    const popup = new maplibregl.Popup({offset: [0, -48]})
        .setHTML(`<strong>${name}</strong><br>${label}`);

    const marker = new maplibregl.Marker({element: el, anchor: "bottom"})
        .setLngLat([lon, lat])
        .setPopup(popup)
        .addTo(map);

    return marker;
}

// ─────────────────────────────────────────────────────────────
// UI: Route List
// ─────────────────────────────────────────────────────────────

function updateUI() {
    const html = Object.values(routeState).map(route => `
    <div class="route-item ${route.visible ? '' : 'disabled'}" data-id="${route.id}" onclick="showRoute('${route.id}')">
      <div class="route-dot" style="background: ${route.color}"></div>
      <div class="route-details">
        <div class="route-name">${route.name}</div>
        <div class="route-info">${route.distance} km · ${route.duration} min</div>
      </div>
      <input type="checkbox" class="route-toggle" ${route.visible ? 'checked' : ''} onclick="toggleRoute('${route.id}', event)">
    </div>
  `).join('');

    document.getElementById("routes-list").innerHTML = html;
}

// ─────────────────────────────────────────────────────────────
// Actions
// ─────────────────────────────────────────────────────────────

window.toggleRoute = (id, event) => {
    event.stopPropagation();

    const route = routeState[id];
    route.visible = !route.visible;

    if (route.visible) {
        addRouteLayer(id);
    } else {
        removeRouteLayer(id);
    }

    updateUI();
    renderMarkers();
};

window.showRoute = (id) => {
    const route = routeState[id];

    // Ensure visible
    if (!route.visible) {
        route.visible = true;
        addRouteLayer(id);
    }

    // Fit bounds to route
    const coords = extractCoordinates(route.feature.geometry);
    const bounds = coords.reduce((b, c) => b.extend(c), new maplibregl.LngLatBounds(coords[0], coords[0]));
    map.fitBounds(bounds, {padding: 80});

    // Highlight
    document.querySelectorAll(".route-item").forEach(el => el.classList.remove("active"));
    document.querySelector(`[data-id="${id}"]`)?.classList.add("active");

    showRouteDetails(route);
    updateUI();
    renderMarkers();
};

// ─────────────────────────────────────────────────────────────
// Route Details Panel
// ─────────────────────────────────────────────────────────────

function showRouteDetails(route) {
    const panel = document.getElementById("route-details");
    const content = document.getElementById("route-details-content");

    panel.style.borderLeftColor = route.color;

    content.innerHTML = `
    <div class="detail-row">
      <span class="detail-label">Route</span>
      <span class="detail-value" style="color: ${route.color}">${route.name}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Distance</span>
      <span class="detail-value">${route.distance} km</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Duration</span>
      <span class="detail-value">${route.duration} min</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">From</span>
      <span class="detail-value">${route.name.replace("From ", "")}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">To</span>
      <span class="detail-value">${DESTINATION.name}</span>
    </div>
  `;

    panel.classList.remove("hidden");
}

</script>
  </body>
</html>
