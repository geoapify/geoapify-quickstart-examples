<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Drag & Drop Editing — Leaflet</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="style.css" inline inline>
  </head>
  <body>
    <div class="panel">
      <h3>Route Editor</h3>
      <p class="hint">Drag points on the route to modify it</p>

      <div id="route-info">
        <div class="info-row">
          <span class="info-label">Distance</span>
          <span class="info-value" id="distance">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Duration</span>
          <span class="info-value" id="duration">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Waypoints</span>
          <span class="info-value" id="waypoint-count">2</span>
        </div>
      </div>

      <div id="waypoints-list"></div>

      <button id="reset-btn" class="btn">Reset Route</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js" inline inline></script>
  </body>
</html>
