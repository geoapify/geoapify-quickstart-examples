<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Routes Visualization — Leaflet</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>/* Base */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: system-ui, sans-serif;
}

/* Layout */
#map {
    position: absolute;
    top: 0;
    left: 280px;
    right: 0;
    bottom: 0;
}

.panel {
    position: absolute;
    top: 0;
    left: 0;
    width: 280px;
    height: 100%;
    background: #fff;
    padding: 16px;
    overflow-y: auto;
    box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
    z-index: 1000;
}

.panel h3 {
    margin-bottom: 4px;
    font-size: 18px;
}

.hint {
    font-size: 12px;
    color: #888;
    margin-bottom: 16px;
}

/* Route Items */
.route-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    margin-bottom: 8px;
    background: #f5f5f5;
    border-radius: 8px;
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
}

.route-item:hover {
    background: #eee;
}

.route-item.disabled {
    opacity: 0.4;
}

.route-item.active {
    background: #e3f2fd;
    border-left-color: #2196F3;
}

.route-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
}

.route-details {
    flex: 1;
}

.route-name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 2px;
}

.route-info {
    font-size: 12px;
    color: #666;
}

.route-toggle {
    width: 18px;
    height: 18px;
    cursor: pointer;
    flex-shrink: 0;
}

/* Route Details Panel */
.route-details-panel {
    margin-top: 16px;
    padding: 14px;
    background: #f8f9fa;
    border-radius: 8px;
    border-left: 4px solid #2196F3;
}

.route-details-panel.hidden {
    display: none;
}

.route-details-panel h4 {
    font-size: 13px;
    color: #666;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.detail-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #e0e0e0;
    font-size: 13px;
}

.detail-row:last-child {
    border-bottom: none;
}

.detail-label {
    color: #888;
}

.detail-value {
    font-weight: 500;
    color: #333;
}

/* Zoom Indicator */
.zoom-indicator {
    position: absolute;
    bottom: 16px;
    left: 16px;
    right: 16px;
    background: #fff;
    border: 2px solid #2196F3;
    border-radius: 6px;
    padding: 8px 12px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.zoom-label {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
}

.zoom-value {
    font-size: 18px;
    font-weight: 700;
    color: #2196F3;
}

/* Responsive */
@media (max-width: 600px) {
    #map {
        left: 0;
        bottom: 45%;
    }

    .panel {
        width: 100%;
        height: 45%;
        top: auto;
        bottom: 0;
    }
}
</style>
  </head>
  <body>
    <div class="panel">
      <h3>Multiple Routes</h3>
      <p class="hint">Routes from different origins to Arc de Triomphe</p>
      <div id="routes-list"></div>

      <div id="route-details" class="route-details-panel hidden">
        <h4>Route Details</h4>
        <div id="route-details-content"></div>
      </div>

      <div class="zoom-indicator">
        <div class="zoom-label">Zoom Level</div>
        <div id="zoom-level" class="zoom-value">13</div>
      </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-polylineoffset@1.1.1/leaflet.polylineoffset.min.js"></script>
    <script>/* Geoapify Routing API — Multiple Routes Visualization
   Shows overlapping routes from different origins to a common destination.
   Get your API key at https://www.geoapify.com */

// 👉 Replace with your own API key
const API_KEY = "e95f313d38334f9f955e65b71a289126";

// ─────────────────────────────────────────────────────────────
// Route Definitions
// ─────────────────────────────────────────────────────────────

const DESTINATION = {
    lat: 48.8738,
    lon: 2.2950,
    name: "Arc de Triomphe"
};

const ROUTES = [
    {id: "r1", name: "From Eiffel Tower", color: "#E53935", origin: {lat: 48.8584, lon: 2.2945}},
    {id: "r2", name: "From Louvre", color: "#43A047", origin: {lat: 48.8606, lon: 2.3376}},
    {id: "r3", name: "From Notre-Dame", color: "#1E88E5", origin: {lat: 48.8530, lon: 2.3499}},
    {id: "r4", name: "From Sacré-Cœur", color: "#FB8C00", origin: {lat: 48.8867, lon: 2.3431}}
];

// ─────────────────────────────────────────────────────────────
// State & Map Setup
// ─────────────────────────────────────────────────────────────

const routeState = {};
let markers = [];
const BASE_OFFSETS = [-4, -1.5, 1.5, 4];
const MIN_OFFSET_PX = 2.5; // Minimum visible offset even on retina displays

const map = L.map("map", {zoomControl: false}).setView([48.866, 2.32], 13);
L.control.zoom({position: "bottomright"}).addTo(map);

L.tileLayer(`https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}@2x.png?apiKey=${API_KEY}`, {
    attribution: '© <a href="https://www.geoapify.com/">Geoapify</a> © OpenMapTiles © OpenStreetMap',
    maxZoom: 20
}).addTo(map);

// Update zoom level display
function updateZoomLevel() {
    const zoomElement = document.getElementById("zoom-level");
    if (zoomElement) {
        zoomElement.textContent = map.getZoom();
    }
}

// Re-render routes on zoom end (pixel filtering depends on zoom level)
function rebuildRoutes() {
    for (const r of Object.values(routeState)) {
        if (!r.visible) continue;
        if (r.layer) map.removeLayer(r.layer);
        r.layer = createRouteLayer(r.feature, r.color, r.index);
    }
}

map.on("zoomend", () => {
    rebuildRoutes();
    updateZoomLevel();
});
updateZoomLevel();

// ─────────────────────────────────────────────────────────────
// Fetch Routes from Routing API
// ─────────────────────────────────────────────────────────────

ROUTES.forEach((route, index) => {
    const waypoints = `${route.origin.lat},${route.origin.lon}|${DESTINATION.lat},${DESTINATION.lon}`;
    const url = `https://api.geoapify.com/v1/routing?waypoints=${waypoints}&mode=drive&apiKey=${API_KEY}`;

    fetch(url)
        .then(res => res.json())
        .then(data => {
            if (!data.features?.[0]) return;

            const feature = data.features[0];
            const props = feature.properties;

            // Store route state (with index for offset calculation)
            routeState[route.id] = {
                ...route,
                index: index,
                visible: true,
                feature: feature,
                layer: createRouteLayer(feature, route.color, index),
                distance: (props.distance / 1000).toFixed(1),
                duration: Math.round(props.time / 60)
            };

            updateUI();
            renderMarkers();
        });
});

// ─────────────────────────────────────────────────────────────
// Route Layer (pixel offset using leaflet-polylineoffset plugin)
// ─────────────────────────────────────────────────────────────

function createRouteLayer(feature, color, index) {
    const group = L.layerGroup();
    const z = map.getZoom();

    // Scale offset based on zoom, but keep a minimum so routes stay visible
    const base = BASE_OFFSETS[index % BASE_OFFSETS.length];
    const scale =
        z >= 18 ? 0.6 :
        z >= 16 ? 0.85 :
        1;
    
    // Clamp to minimum offset while preserving sign (direction)
    const offsetPx = Math.sign(base) * Math.max(Math.abs(base * scale), MIN_OFFSET_PX);

    const {minPx, smoothFactor} = qualityForZoom(z);

    // Render each part separately (don't flatten MultiLineString)
    for (const part of extractLatLngParts(feature.geometry)) {
        const pts = filterByPixelStep(map, part, minPx);
        addCasedPolyline(group, pts, color, offsetPx, smoothFactor);
    }

    group.getBounds = () => L.featureGroup(group.getLayers()).getBounds();
    return group.addTo(map);
}

function addCasedPolyline(group, latLngs, color, offsetPx, smoothFactor) {
    const outline = L.polyline(latLngs, {
        color: darkenColor(color, 30),
        weight: 7,
        opacity: 0.9,
        lineCap: "round",
        lineJoin: "bevel",
        smoothFactor
    });
    outline.setOffset?.(offsetPx);
    outline.addTo(group);

    const main = L.polyline(latLngs, {
        color,
        weight: 4,
        opacity: 1,
        lineCap: "round",
        lineJoin: "bevel",
        smoothFactor
    });
    main.setOffset?.(offsetPx);
    main.addTo(group);
}

function qualityForZoom(z) {
    if (z <= 11) return {minPx: 15, smoothFactor: 12};
    if (z <= 13) return {minPx: 8, smoothFactor: 8};
    if (z <= 15) return {minPx: 4, smoothFactor: 4};
    return {minPx: 2, smoothFactor: 2};
}

// Extract lat/lng parts WITHOUT flattening MultiLineString (avoids fake joints)
function extractLatLngParts(geometry) {
    if (geometry.type === "LineString") {
        return [geometry.coordinates.map(([lon, lat]) => [lat, lon])];
    }
    if (geometry.type === "MultiLineString") {
        return geometry.coordinates.map(line => line.map(([lon, lat]) => [lat, lon]));
    }
    return [];
}

// Remove points that are too close in pixel space + exact duplicates
function filterByPixelStep(map, latLngs, minPx) {
    const out = [];
    let lastPt = null;
    let lastLL = null;

    for (const ll of latLngs) {
        if (lastLL && ll[0] === lastLL[0] && ll[1] === lastLL[1]) continue;

        const pt = map.latLngToLayerPoint(ll);
        if (!lastPt || pt.distanceTo(lastPt) >= minPx) {
            out.push(ll);
            lastPt = pt;
            lastLL = ll;
        }
    }
    return out.length >= 2 ? out : latLngs;
}

// ─────────────────────────────────────────────────────────────
// Color Utilities
// ─────────────────────────────────────────────────────────────

// Darken a hex color
function darkenColor(hex, percent) {
    const num = parseInt(hex.replace("#", ""), 16);
    const amt = Math.round(2.55 * percent);
    const R = Math.max((num >> 16) - amt, 0);
    const G = Math.max((num >> 8 & 0x00FF) - amt, 0);
    const B = Math.max((num & 0x0000FF) - amt, 0);
    return "#" + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
}

// ─────────────────────────────────────────────────────────────
// Markers (Geoapify Marker Icon API v2)
// ─────────────────────────────────────────────────────────────

function renderMarkers() {
    // Clear existing markers
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    // Destination marker (flag icon)
    markers.push(
        createMarker(DESTINATION.lat, DESTINATION.lon, "%23E91E63", "flag", DESTINATION.name, "Destination")
    );

    // Origin markers (circle icon, matching route color)
    Object.values(routeState).forEach(route => {
        if (!route.visible) return;

        const color = route.color.replace("#", "%23");
        const name = route.name.replace("From ", "");
        markers.push(
            createMarker(route.origin.lat, route.origin.lon, color, "circle", name, "Origin")
        );
    });
}

function createMarker(lat, lon, color, iconName, name, label) {
    const iconUrl = `https://api.geoapify.com/v2/icon?type=awesome&color=${color}&icon=${iconName}&iconType=awesome&size=48&scaleFactor=2&apiKey=${API_KEY}`;

    const icon = L.icon({
        iconUrl: iconUrl,
        iconSize: [36, 48],
        iconAnchor: [18, 48],
        popupAnchor: [0, -48]
    });

    return L.marker([lat, lon], {icon})
        .bindPopup(`<strong>${name}</strong><br>${label}`)
        .addTo(map);
}

// ─────────────────────────────────────────────────────────────
// UI: Route List
// ─────────────────────────────────────────────────────────────

function updateUI() {
    const html = Object.values(routeState).map(route => `
    <div class="route-item ${route.visible ? '' : 'disabled'}" data-id="${route.id}" onclick="showRoute('${route.id}')">
      <div class="route-dot" style="background: ${route.color}"></div>
      <div class="route-details">
        <div class="route-name">${route.name}</div>
        <div class="route-info">${route.distance} km · ${route.duration} min</div>
      </div>
      <input type="checkbox" class="route-toggle" ${route.visible ? 'checked' : ''} onclick="toggleRoute('${route.id}', event)">
    </div>
  `).join('');

    document.getElementById("routes-list").innerHTML = html;
}

// ─────────────────────────────────────────────────────────────
// Actions
// ─────────────────────────────────────────────────────────────

// Toggle route visibility (checkbox)
window.toggleRoute = (id, event) => {
    event.stopPropagation();

    const route = routeState[id];
    route.visible = !route.visible;

    if (route.visible) {
        // Recreate layer to maintain proper offset
        route.layer = createRouteLayer(route.feature, route.color, route.index);
    } else {
        map.removeLayer(route.layer);
    }

    updateUI();
    renderMarkers();
};

// Show route and fit bounds (click on item)
window.showRoute = (id) => {
    const route = routeState[id];

    // Ensure route is visible
    if (!route.visible) {
        route.visible = true;
        route.layer = createRouteLayer(route.feature, route.color, route.index);
    }

    // Fit map to route bounds
    map.fitBounds(route.layer.getBounds(), {padding: [50, 50]});

    // Highlight active item
    document.querySelectorAll(".route-item").forEach(el => el.classList.remove("active"));
    document.querySelector(`[data-id="${id}"]`)?.classList.add("active");

    // Show route details
    showRouteDetails(route);

    updateUI();
    renderMarkers();
};

// ─────────────────────────────────────────────────────────────
// Route Details Panel
// ─────────────────────────────────────────────────────────────

function showRouteDetails(route) {
    const panel = document.getElementById("route-details");
    const content = document.getElementById("route-details-content");

    // Update border color to match route
    panel.style.borderLeftColor = route.color;

    // Build details HTML
    content.innerHTML = `
    <div class="detail-row">
      <span class="detail-label">Route</span>
      <span class="detail-value" style="color: ${route.color}">${route.name}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Distance</span>
      <span class="detail-value">${route.distance} km</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Duration</span>
      <span class="detail-value">${route.duration} min</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">From</span>
      <span class="detail-value">${route.name.replace("From ", "")}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">To</span>
      <span class="detail-value">${DESTINATION.name}</span>
    </div>
  `;

    // Show panel
    panel.classList.remove("hidden");
}
</script>
  </body>
</html>
