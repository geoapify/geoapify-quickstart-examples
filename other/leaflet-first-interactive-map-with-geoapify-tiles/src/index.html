<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Leaflet: First Interactive Map with Geoapify Tiles</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="style.css" inline>

  </head>

  <body>
    <!-- The container where the map will be rendered -->
    <div id="my-map"></div>

    <!-- Load Leaflet JavaScript library (the leaflet.css in the <head> tag) -->
    <!-- Check the actual version on https://leafletjs.com/download.html -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <div class="coords" id="coords">Click the map to get coordinates</div>
    <script src="script.js" inline></script>

  </body>

</html>
