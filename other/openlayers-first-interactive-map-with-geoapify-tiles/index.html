<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>OpenLayers: First Interactive Map with Geoapify Tiles</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.6.0/ol.css">
    <style>html,
body {
  margin: 0;
  height: 100%;
}
#map {
  height: 100vh;
  width: 100%;
}
.coords {
  position: absolute;
  bottom: 10px;
  left: 10px;
  z-index: 1000;
  background: rgba(255, 255, 255, 0.9);
  padding: 6px 10px;
  border-radius: 6px;
  font: 12px/1.2 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}
.ol-overlay-container {
  transition: transform 0.2s ease;
}

.marker-popup {
  background: rgba(255, 255, 255, 0.95);
  padding: 6px 10px;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
  font: 12px system-ui, sans-serif;
}

.marker {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background-color: #1e90ff;
  border: 2px solid #fff;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
}

/* Style for the scale line (top-left corner) */
.ol-scale-bar {
  top: 80px !important;
  left: 10px !important;
  right: auto !important;
  bottom: auto !important;
}</style>

  </head>

  <body>
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.6.0/dist/ol.js"></script>

    <div id="map"></div>
    <div id="coords" class="coords">Click the map to get coordinates</div>
    <script>// 👉 Replace with your own API key. Sign up at https://www.geoapify.com/ to get one.
const apiKey = "f82ea38cb77543d59c597faaa263e714";

// 1) Define map center and base layer
const center = ol.proj.fromLonLat([-0.09, 51.505]); // Lon, Lat

// Detect Retina / HiDPI display
const isRetina = window.devicePixelRatio > 1;
const retinaSuffix = isRetina ? "@2x" : "";

const map = new ol.Map({
  target: "map",
  layers: [
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: `https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}${retinaSuffix}.png?apiKey=${apiKey}`,
        tilePixelRatio: isRetina ? 2 : 1,
        attributions:
          'Powered by <a href="https://www.geoapify.com/" target="_blank">Geoapify</a> | <a href="https://openmaptiles.org/" target="_blank">© OpenMapTiles</a> <a href="https://www.openstreetmap.org/copyright" target="_blank">© OpenStreetMap</a> contributors'
      })
    })
  ],
  view: new ol.View({
    center,
    zoom: 13
  })
});

// 2) Add scale line
const scaleLine = new ol.control.ScaleLine({
  units: "imperial",
  bar: true,
  steps: 4,
  text: true,
  minWidth: 100
});
map.addControl(scaleLine);

// 3) Marker element
const markerEl = document.createElement("div");

const marker = new ol.Overlay({
  position: center,
  element: markerEl,
  positioning: "center-center",
  className: "marker"
});
map.addOverlay(marker);

// 4) Popup element
const popupEl = document.createElement("div");
popupEl.textContent = "Hello, OpenLayers!";

const popup = new ol.Overlay({
  position: center,
  element: popupEl,
  positioning: "bottom-center",
  offset: [0, -15],
  className: "marker-popup"
});
map.addOverlay(popup);

// 5) Show coordinates on click
const coordsEl = document.getElementById("coords");
map.on("click", (evt) => {
  const [lon, lat] = ol.proj.toLonLat(evt.coordinate);
  coordsEl.textContent = `Lon: ${lon.toFixed(5)}, Lat: ${lat.toFixed(5)}`;
  marker.setPosition(evt.coordinate);
  popupEl.textContent = `You clicked at ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
  popup.setPosition(evt.coordinate);
});</script>

  </body>

</html>
